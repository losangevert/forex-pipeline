# Airflow + PostgreSQL + Metabase pour le pipeline forex
---
services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: forex
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_forex_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d forex"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.10.5
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/dags /opt/airflow/scripts
        airflow db init
        # Créer la Connection PostgreSQL
        airflow connections add 'postgres_forex' \
          --conn-type 'postgres' \
          --conn-host 'postgres' \
          --conn-port 5432 \
          --conn-schema 'forex' \
          --conn-login 'airflow' \
          --conn-password 'airflow_forex_2026'
        # Créer les Variables Airflow
        airflow variables set 'forex_currencies' 'EUR,USD,GBP,JPY,CHF'
        airflow variables set 'forex_alert_threshold' '2.0'
        airflow variables set 'forex_freshness_hours' '6'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_forex_2026@postgres:5432/forex
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__WEBSERVER__RBAC: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_data:/opt/airflow

  airflow-scheduler:
    image: apache/airflow:2.10.5
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_forex_2026@postgres:5432/forex
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.10.5
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_forex_2026@postgres:5432/forex
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.53.7
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: forex
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_USER: airflow
      MB_DB_PASS: airflow_forex_2026
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_data:
